name: Terraform

on:
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
    types: [opened, synchronize, reopened, labeled] # Plan on every PR update; label triggers for manual plan/apply.
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      command:
        description: TF command
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  actions: read # Required to identify workflow run.
  checks: write # Required to add status summary.
  contents: read # Required to checkout repository.
  id-token: write # Required to authenticate via OIDC.
  issues: write # Required to manage PR labels via Issues API.
  pull-requests: write # Required to add PR comment.

env:
  AWS_ACCOUNT_ID: '838419074361'
  AWS_REGION: 'us-east-2'
  TF_WORKING_DIR: './terraform'

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    # Skip labeled events that don't carry a TF label (e.g., unrelated labels).
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.action != 'labeled' ||
      contains(github.event.pull_request.labels.*.name, 'run-plan') ||
      contains(github.event.pull_request.labels.*.name, 'run-apply')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: AWS Authenticate (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: 'arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-oidc'
          aws-region: '${{ env.AWS_REGION }}'

      - name: Create Terraform plugin cache
        run: |
          mkdir --parents $HOME/.terraform.d/plugin-cache
          echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> $GITHUB_ENV

      - name: Cache Terraform plugins
        uses: actions/cache@v5
        with:
          path: ~/.terraform.d/plugin-cache
          key: cache-tf-${{ runner.os }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: cache-tf-${{ runner.os }}-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false # Required for TF-via-PR to capture detailed exit codes.

      # Security scanning — runs on every event except label-only triggers.
      - name: Run Checkov
        if: github.event.action != 'labeled'
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          output_format: sarif
          output_file_path: terraform-checkov.sarif
        continue-on-error: true

      - name: Upload Checkov results
        if: github.event.action != 'labeled' && always() && hashFiles('terraform-checkov.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: terraform-checkov.sarif
        continue-on-error: true

      - name: Run tfsec
        if: github.event.action != 'labeled'
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TF_WORKING_DIR }}
          soft_fail: true
        continue-on-error: true

      # Plan on PR, apply on merge to main or via run-apply label/workflow_dispatch.
      - name: Provision TF
        uses: op5dev/tf-via-pr@v13
        env:
          NETLIFY_API_TOKEN: ${{ secrets.NETLIFY_API_TOKEN }}
          TF_LOG: ERROR
          TF_IN_AUTOMATION: true
        with:
          working-directory: ${{ env.TF_WORKING_DIR }}
          command: >-
            ${{ inputs.command ||
                (github.event_name == 'push' && 'apply') ||
                (contains(github.event.pull_request.labels.*.name, 'run-apply') && 'apply') ||
                'plan' }}
          arg-lock: >-
            ${{ inputs.command == 'apply' ||
                github.event_name == 'push' ||
                contains(github.event.pull_request.labels.*.name, 'run-apply') }}
          plan-encrypt: ${{ secrets.TF_PLAN_PASSPHRASE }}
          validate: true
          format: true
          expand-diff: true
          comment-pr: always
          retention-days: 30

      - name: Remove label
        if: |
          always() && (
            contains(github.event.pull_request.labels.*.name, 'run-plan') ||
            contains(github.event.pull_request.labels.*.name, 'run-apply')
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          PR_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-plan') && 'run-plan' || 'run-apply' }}
        run: gh api /repos/{owner}/{repo}/issues/${PR_NUMBER}/labels/${PR_LABEL} --method DELETE
